<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="100%" height="100%">
  <defs>
    <!-- Burgundy to Rose Gradient -->
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#800020" />
      <stop offset="40%" stop-color="#A4243B" />
      <stop offset="100%" stop-color="#D4586A" />
    </linearGradient>
    
    <!-- Champagne Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8E6F3E" />
      <stop offset="50%" stop-color="#C5A059" />
      <stop offset="100%" stop-color="#E8C380" />
    </linearGradient>
    
    <!-- Premium Drop Shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#A4243B" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Interlocking Double Hearts representing Divine Connection -->
  <!-- Left Heart (Burgundy/Rose) -->
  <path d="M 35,25 
           C 20,10 5,20 5,42 
           C 5,65 30,80 50,95 
           C 40,85 25,70 20,55 
           C 16,43 20,32 30,30 
           C 35,29 40,31 43,35 
           C 41,31 38,27 35,25 Z" 
        fill="url(#heartGrad)" 
        filter="url(#glow)" />
        
  <!-- Right Heart (Champagne Gold) -->
  <path d="M 65,25 
           C 80,10 95,20 95,42 
           C 95,65 70,80 50,95 
           C 60,85 75,70 80,55 
           C 84,43 80,32 70,30 
           C 65,29 60,31 57,35 
           C 59,31 62,27 65,25 Z" 
        fill="url(#goldGrad)" 
        filter="url(#glow)" />

  <!-- A delicate connecting ring in the center -->
  <path d="M 43,35 Q 50,28 57,35 Q 50,42 43,35 Z" fill="#FAF5F0" filter="url(#glow)" opacity="0.95" />
  <circle cx="50" cy="35" r="2.5" fill="url(#goldGrad)" />
</svg>